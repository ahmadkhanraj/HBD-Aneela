<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cut the Cake! 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital@1&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg1: #1a0533;
      --bg2: #3b1060;
      --bg3: #6b21a8;
      --pink: #f472b6;
      --rose: #fb7185;
      --gold: #fbbf24;
      --cream: #fdf4ff;
      --white: #ffffff;
      --tier1: #f9a8d4;
      --tier2: #e879f9;
      --tier3: #a855f7;
      --frosting: #fce7f3;
    }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #4a1280 0%, #1a0533 60%, #0d0220 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── STARS ── */
    .stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity:.1; transform:scale(1); }
      50%      { opacity:.8; transform:scale(1.4); }
    }

    /* ── FLOATING ORBS ── */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(60px); opacity: .15;
      animation: orbDrift 16s ease-in-out infinite;
    }
    .orb1 { width:280px; height:280px; background:#c026d3; top:5%;  left:5%;  animation-delay:0s; }
    .orb2 { width:200px; height:200px; background:#f472b6; bottom:10%; right:8%; animation-delay:-7s; }
    .orb3 { width:160px; height:160px; background:var(--gold); top:40%;  right:15%; animation-delay:-13s; }
    @keyframes orbDrift {
      0%,100% { transform:translate(0,0); }
      33%      { transform:translate(20px,-20px); }
      66%      { transform:translate(-15px,15px); }
    }

    /* ── HEADER TEXT ── */
    .header {
      position: relative; z-index: 10;
      text-align: center;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeDown 1s cubic-bezier(.22,1,.36,1) .3s forwards;
    }
    .header-badge {
      display: inline-block;
      font-size: .58rem; letter-spacing: .45em;
      color: var(--gold); font-weight: 200;
      text-transform: uppercase;
      border: 1px solid rgba(251,191,36,.3);
      padding: 5px 18px; border-radius: 50px;
      margin-bottom: 10px;
      background: rgba(251,191,36,.05);
    }
    .header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      color: var(--cream);
      text-shadow: 0 0 40px rgba(244,114,182,.7), 0 2px 12px rgba(0,0,0,.5);
      line-height: 1.1;
    }
    .header h1 span { color: var(--gold); }
    .header-sub {
      font-size: .65rem; letter-spacing: .3em;
      color: rgba(253,244,255,.4); margin-top: 8px;
      text-transform: uppercase;
    }

    /* ── CAKE SCENE ── */
    .cake-scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(.22,1,.36,1) .7s forwards;
    }

    /* Glow plate */
    .plate {
      width: 240px; height: 18px;
      background: linear-gradient(90deg, transparent, rgba(244,114,182,.3), rgba(251,191,36,.4), rgba(244,114,182,.3), transparent);
      border-radius: 50%;
      filter: blur(4px);
      margin-top: -6px;
      animation: platePulse 2.5s ease-in-out infinite;
    }
    @keyframes platePulse {
      0%,100% { opacity:.6; transform:scaleX(1); }
      50%      { opacity:1;  transform:scaleX(1.05); }
    }

    /* ── CAKE TIERS ── */
    .cake {
      position: relative;
      display: flex; flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 20px 40px rgba(168,85,247,.4));
      transition: transform .3s ease;
    }
    .cake:hover { transform: translateY(-4px); }

    /* Tier shared */
    .tier {
      position: relative;
      border-radius: 8px 8px 4px 4px;
      overflow: visible;
    }

    /* Top tier */
    .tier-top {
      width: 110px; height: 70px;
      background: linear-gradient(135deg, #fce7f3 0%, #f9a8d4 40%, #ec4899 100%);
      border-radius: 10px 10px 4px 4px;
      box-shadow: inset 0 3px 8px rgba(255,255,255,.4), 0 4px 16px rgba(236,72,153,.4);
      z-index: 3;
    }
    /* Middle tier */
    .tier-mid {
      width: 155px; height: 80px;
      background: linear-gradient(135deg, #fdf4ff 0%, #e879f9 40%, #a855f7 100%);
      border-radius: 8px 8px 4px 4px;
      box-shadow: inset 0 3px 8px rgba(255,255,255,.35), 0 6px 20px rgba(168,85,247,.5);
      margin-top: -2px; z-index: 2;
    }
    /* Bottom tier */
    .tier-bot {
      width: 200px; height: 90px;
      background: linear-gradient(135deg, #fdf4ff 0%, #c084fc 40%, #7c3aed 100%);
      border-radius: 8px 8px 4px 4px;
      box-shadow: inset 0 3px 8px rgba(255,255,255,.3), 0 8px 28px rgba(124,58,237,.5);
      margin-top: -2px; z-index: 1;
    }

    /* Frosting drips */
    .tier::before {
      content: '';
      position: absolute;
      top: -4px; left: 10%; right: 10%;
      height: 12px;
      background: var(--frosting);
      border-radius: 0 0 8px 8px;
      clip-path: polygon(0% 0%, 5% 100%, 10% 0%, 17% 100%, 24% 0%, 31% 100%, 38% 0%, 45% 100%, 52% 0%, 59% 100%, 66% 0%, 73% 100%, 80% 0%, 87% 100%, 94% 0%, 100% 100%, 100% 0%);
      opacity: .85;
    }

    /* Sprinkles */
    .tier::after {
      content: '';
      position: absolute; inset: 8px;
      background-image:
        radial-gradient(circle, var(--gold) 1.5px, transparent 1.5px),
        radial-gradient(circle, var(--rose) 1.5px, transparent 1.5px),
        radial-gradient(circle, #fff 1px, transparent 1px);
      background-size: 22px 22px, 17px 17px, 13px 13px;
      background-position: 0 0, 8px 8px, 4px 12px;
      opacity: .45;
      border-radius: 6px;
    }

    /* Decorative dots on tiers */
    .dots {
      position: absolute;
      bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.6);
      box-shadow: 0 0 6px rgba(255,255,255,.8);
      animation: dotGlow 1.8s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .3s; background: var(--gold); }
    .dot:nth-child(3) { animation-delay: .6s; }
    .dot:nth-child(4) { animation-delay: .9s; background: var(--rose); }
    .dot:nth-child(5) { animation-delay: 1.2s; }
    @keyframes dotGlow {
      0%,100% { transform:scale(1); opacity:.6; }
      50%      { transform:scale(1.4); opacity:1; }
    }

    /* ── CANDLES ── */
    .candles {
      position: absolute;
      top: -52px;
      display: flex; gap: 18px;
      z-index: 10;
    }
    .candle {
      display: flex; flex-direction: column; align-items: center;
    }
    .candle-body {
      width: 10px; height: 34px;
      border-radius: 3px;
      position: relative;
      box-shadow: inset 0 0 6px rgba(0,0,0,.2);
    }
    .c1 .candle-body { background: linear-gradient(180deg, #fde68a, #f59e0b); }
    .c2 .candle-body { background: linear-gradient(180deg, #fbcfe8, #ec4899); }
    .c3 .candle-body { background: linear-gradient(180deg, #bbf7d0, #10b981); }

    /* Wax drip */
    .candle-body::after {
      content:'';
      position:absolute; top:2px; left:1px;
      width:4px; height:10px;
      background:rgba(255,255,255,.4);
      border-radius:2px;
    }

    /* Flame */
    .flame-wrap {
      position: relative;
      width: 14px; height: 22px;
      margin-bottom: -2px;
    }
    .flame {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 18px;
      background: radial-gradient(ellipse at 50% 80%, #fff 0%, var(--gold) 30%, #f97316 65%, transparent 100%);
      border-radius: 50% 50% 20% 20%;
      animation: flicker 0.8s ease-in-out infinite alternate;
      box-shadow: 0 0 12px 4px rgba(251,191,36,.6), 0 0 24px 8px rgba(249,115,22,.3);
    }
    .flame::after {
      content:'';
      position:absolute; bottom:2px; left:50%;
      transform:translateX(-50%);
      width:5px; height:10px;
      background:rgba(255,255,255,.7);
      border-radius:50%;
    }
    @keyframes flicker {
      0%   { transform:translateX(-50%) scaleX(1)   scaleY(1)   rotate(-2deg); }
      100% { transform:translateX(-50%) scaleX(.85) scaleY(1.1) rotate(2deg); }
    }
    .c2 .flame { animation-delay: .3s; }
    .c3 .flame { animation-delay: .6s; }

    /* Glow under flame */
    .flame-glow {
      position:absolute; bottom:-2px; left:50%;
      transform:translateX(-50%);
      width:18px; height:8px;
      background:rgba(251,191,36,.35);
      border-radius:50%;
      filter:blur(4px);
      animation:flicker .8s ease-in-out infinite alternate;
    }

    /* ── BUTTON ── */
    .cut-btn {
      margin-top: 32px;
      position: relative; z-index: 10;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(.22,1,.36,1) 1.3s forwards;
    }
    .cut-cake-btn {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      color: var(--bg1);
      background: linear-gradient(135deg, var(--gold) 0%, #f59e0b 40%, #fbbf24 100%);
      border: none; border-radius: 50px;
      padding: 14px 42px;
      cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 30px rgba(251,191,36,.5), 0 2px 8px rgba(0,0,0,.3);
      transition: transform .2s ease, box-shadow .2s ease;
      letter-spacing: .02em;
    }
    .cut-cake-btn::before {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.35) 50%,transparent 65%);
      transform:translateX(-100%);
      transition:transform .5s ease;
    }
    .cut-cake-btn:hover::before { transform:translateX(100%); }
    .cut-cake-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 40px rgba(251,191,36,.65), 0 4px 12px rgba(0,0,0,.3);
    }
    .cut-cake-btn:active { transform:scale(.97); }

    /* ── CELEBRATION OVERLAY ── */
    .celebration {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 50%, rgba(74,18,128,.95) 0%, rgba(13,2,32,.98) 100%);
      opacity: 0; pointer-events: none;
      transition: opacity .6s ease;
    }
    .celebration.active { opacity:1; pointer-events:all; }

    .celebration h2 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 7vw, 5rem);
      color: var(--cream);
      text-shadow: 0 0 60px rgba(244,114,182,.8), 0 0 20px rgba(251,191,36,.6);
      text-align: center;
      animation: celebPop .6s cubic-bezier(.22,1,.36,1) .2s both;
    }
    .celebration h2 span { color:var(--gold); }
    .celebration p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(253,244,255,.65);
      font-size: clamp(.9rem,2vw,1.2rem);
      margin-top: 12px;
      animation: celebPop .6s cubic-bezier(.22,1,.36,1) .5s both;
      text-align:center; padding:0 20px;
    }
    .celebration-emojis {
      font-size: 2.5rem;
      letter-spacing: 12px;
      margin-top: 20px;
      animation: celebPop .6s cubic-bezier(.22,1,.36,1) .7s both, pulse 1.5s ease-in-out 1.3s infinite;
    }
    @keyframes celebPop {
      from { opacity:0; transform:scale(.5) translateY(20px); }
      to   { opacity:1; transform:scale(1)  translateY(0); }
    }
    @keyframes pulse {
      0%,100% { transform:scale(1); }
      50%      { transform:scale(1.08); }
    }

    /* ── CONFETTI ── */
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:101; }
    .cp { position:absolute; top:-30px; opacity:0; animation:fall linear infinite; font-size:16px; }
    @keyframes fall {
      0%   { top:-30px; opacity:0; transform:rotate(0deg); }
      8%   { opacity:1; }
      100% { top:110%;  opacity:.5; transform:rotate(540deg); }
    }

    /* ── CUT ANIMATION ── */
    .cake.cut .tier-top  { animation:sliceFly .8s cubic-bezier(.22,1,.36,1) .1s forwards; }
    .cake.cut .tier-mid  { animation:sliceFly .8s cubic-bezier(.22,1,.36,1) .2s forwards; }
    .cake.cut .tier-bot  { animation:sliceFly .8s cubic-bezier(.22,1,.36,1) .3s forwards; }
    @keyframes sliceFly {
      0%   { transform:scale(1) rotate(0deg) translateY(0); }
      40%  { transform:scale(1.1) rotate(-3deg) translateY(-10px); }
      100% { transform:scale(0) rotate(20deg) translateY(60px); opacity:0; }
    }

    /* ── MISC ── */
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-20px);}
      to{opacity:1;transform:translateY(0);}
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    @media(max-width:500px){
      .tier-top{width:90px;height:58px;}
      .tier-mid{width:130px;height:68px;}
      .tier-bot{width:170px;height:76px;}
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="stars" id="stars"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-badge">✨ &nbsp; A Birthday Surprise &nbsp; ✨</div>
    <h1>Make a <span>Wish</span> 🌟</h1>
    <p class="header-sub">and cut the cake</p>
  </div>

  <!-- Cake Scene -->
  <div class="cake-scene">
    <div class="cake" id="cake">

      <!-- Candles on top tier -->
      <div class="candles">
        <div class="candle c1">
          <div class="flame-wrap"><div class="flame"></div><div class="flame-glow"></div></div>
          <div class="candle-body"></div>
        </div>
        <div class="candle c2">
          <div class="flame-wrap"><div class="flame"></div><div class="flame-glow"></div></div>
          <div class="candle-body"></div>
        </div>
        <div class="candle c3">
          <div class="flame-wrap"><div class="flame"></div><div class="flame-glow"></div></div>
          <div class="candle-body"></div>
        </div>
      </div>

      <!-- Top tier -->
      <div class="tier tier-top">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <!-- Mid tier -->
      <div class="tier tier-mid">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <!-- Bottom tier -->
      <div class="tier tier-bot">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <!-- Glow plate -->
    <div class="plate"></div>
  </div>

  <!-- Button -->
  <div class="cut-btn">
    <button class="cut-cake-btn" onclick="cutCake()">Cut The Cake 🎂</button>
  </div>

  <!-- Celebration screen -->
  <div class="celebration" id="celebration">
    <div class="confetti" id="confetti"></div>
    <h2>Happy Birthday<br/><span>Aneela!</span> 🎂</h2>
    <p>May all your wishes come true, always 💖</p>
    <div class="celebration-emojis">🎉 🎈 🎀 💖 🌟</div>
  </div>

  <!-- Audio -->
  <audio id="birthdayMusic" loop>
    <source src="music2.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ── STARS ──
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        animation-duration:${Math.random()*3+2}s;
        animation-delay:${Math.random()*4}s;
      `;
      starsEl.appendChild(s);
    }

    // ── MUSIC ──
    const music = document.getElementById('birthdayMusic');
    window.addEventListener('load', () => {
      music.play().catch(() => {
        document.body.addEventListener('click', () => music.play(), { once: true });
      });
    });

    // ── CONFETTI ──
    const emojis = ['🎉','🎈','🎀','💖','⭐','🌸','🎂','✨','💫','🌟','🎁','💕','🥳'];
    function launchConfetti() {
      const container = document.getElementById('confetti');
      for (let i = 0; i < 22; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'cp';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + '%';
          el.style.fontSize = (Math.random()*12+12) + 'px';
          const dur = Math.random()*4+4;
          el.style.animationDuration = dur + 's';
          el.style.animationDelay    = Math.random()*2 + 's';
          container.appendChild(el);
          setTimeout(() => el.remove(), (dur+3)*1000);
        }, i * 100);
      }
    }

    // ── CUT CAKE ──
    function cutCake() {
      const cake = document.getElementById('cake');
      const celebration = document.getElementById('celebration');
      const btn = document.querySelector('.cut-cake-btn');
      window.location.href = 'page4.html';

      // Disable button
      btn.disabled = true;
      btn.style.opacity = '.5';

      // Animate cake
      cake.classList.add('cut');

      // Show celebration after tiers fly off
      setTimeout(() => {
        celebration.classList.add('active');
        launchConfetti();
        setInterval(launchConfetti, 5500);
      }, 900);
    }
  </script>
</body>
</html>
